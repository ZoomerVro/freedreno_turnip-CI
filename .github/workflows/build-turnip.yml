name: Build "Turnip" A9

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Select build type"
        required: true
        default: "both"
        type: choice
        options:
          - magisk
          - adrenotools
          - both

jobs:
  start_building_turnip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt build-dep mesa -y
          sudo apt install -y \
            ninja-build \
            patchelf \
            unzip \
            curl \
            zip \
            python3-pip \
            flex \
            bison \
            glslang-tools
          pip3 install --upgrade meson mako
          meson --version

      - name: Execute Build Script
        id: build
        run: |
          bash ./turnip_builder_a9.sh "${{ github.event.inputs.build_type }}"
          echo "VERSION=$(cat $GITHUB_WORKSPACE/turnip_workdir/mesa-main/VERSION)" >> $GITHUB_ENV
          echo "DATE=$(date +'%d%m%Y')" >> $GITHUB_ENV

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            turnip_workdir/ninja_log
            turnip_workdir/meson_log

      # ==============================
      # Upload Magisk Artifact
      # ==============================
      - name: Upload Magisk Module
        if: github.event.inputs.build_type == 'magisk' || github.event.inputs.build_type == 'both'
        uses: actions/upload-artifact@v6
        with:
          name: Turnip-Magisk-${{ env.VERSION }}-${{ env.DATE }}
          path: turnip_workdir/turnip.zip

      # ==============================
      # Upload AdrenoTools Artifact
      # ==============================
      - name: Upload AdrenoTools Driver
        if: github.event.inputs.build_type == 'adrenotools' || github.event.inputs.build_type == 'both'
        uses: actions/upload-artifact@v6
        with:
          name: Turnip-AdrenoTools-${{ env.VERSION }}-${{ env.DATE }}
          path: |
            turnip_workdir/vulkan.freedreno.so
            turnip_workdir/meta.json
